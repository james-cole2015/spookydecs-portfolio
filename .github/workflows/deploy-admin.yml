# Caller workflow for the admin sub (#331, built on the #269 spike / #267 pattern).
#   push to development  -> deploy dev   (auto)
#   push to main         -> deploy prod  (auto)
#   push to demo         -> deploy demo  (auto; #318 branch-promotion model)
#   prod                 -> manual workflow_dispatch hatch (emergency prod deploy)
#
# Admin is a React + Vite app built via the @spookydecs/ui npm workspace (#320).
# build_workdir '.' runs from the repo root so workspace hoisting resolves
# @spookydecs/ui. The lib is built first (npm run build -w @spookydecs/ui) since
# dist/ is gitignored and CI cannot rely on a checked-in build. artifact_dir is
# dist (relative to subs/admin/ — resolved by the reusable workflow).
name: Deploy Admin Sub

on:
  push:
    branches: [development, main, demo]
    paths: ['subs/admin/**', 'packages/ui/**']
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Target env for manual deploy'
        required: true
        type: choice
        options: [prod]
        default: prod

# Required so the called reusable workflow can request id-token: write for OIDC.
permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: admin
      deploy_env: dev
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:admin'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: admin
      deploy_env: prod
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:admin'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-demo:
    if: github.event_name == 'push' && github.ref == 'refs/heads/demo'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: admin
      deploy_env: demo
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:admin'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: admin
      deploy_env: ${{ inputs.deploy_env || 'prod' }}
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:admin'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit
