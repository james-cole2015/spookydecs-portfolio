# Caller workflow for the storage sub (#269 spike, extended by #267).
#   push to development  -> deploy dev   (auto)
#   push to main         -> deploy prod  (auto)
#   push to demo         -> deploy demo  (auto; #318 branch-promotion model)
#   prod                 -> manual workflow_dispatch hatch (emergency prod deploy)
#
# Storage is a React + Vite app built via the @spookydecs/ui npm workspace (#320).
# build_workdir '.' runs from the repo root so workspace hoisting resolves
# @spookydecs/ui. The lib is built first (npm run build -w @spookydecs/ui) since
# dist/ is gitignored and CI cannot rely on a checked-in build. artifact_dir
# is still dist (relative to subs/storage/ — resolved by the reusable workflow).
name: Deploy Storage Sub

on:
  push:
    branches: [development, main, demo]
    paths: ['subs/storage/**', 'packages/ui/**']
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Target env for manual deploy (emergency prod hatch)'
        required: true
        type: choice
        options: [prod]
        default: prod

# Required so the called reusable workflow can request id-token: write for OIDC.
# (Repo default_workflow_permissions is "read", which would otherwise cap
# id-token at "none" and fail the call at startup.)
permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: dev
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:storage'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: prod
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:storage'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-demo:
    if: github.event_name == 'push' && github.ref == 'refs/heads/demo'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: demo
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:storage'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: ${{ inputs.deploy_env || 'prod' }}
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:storage'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit
