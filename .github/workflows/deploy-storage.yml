# Caller workflow for the storage sub (#269 spike, extended by #267).
#   push to development  -> deploy dev   (auto)
#   push to main         -> deploy prod  (auto)
#   demo / prod          -> manual workflow_dispatch only (keeps demo freezable)
#
# Storage is now a React + Vite app (#267), so every job runs a build and syncs
# the built artifact (subs/storage/dist) instead of the sub root. The reusable
# _deploy-sub.yml already supports build_command/artifact_dir, so no change is
# needed there.
#
# NOTE (#267 scope): the live target for this issue is DEMO only, reached via the
# manual workflow_dispatch run from the bodega-bay/267 branch. The dev/prod auto
# jobs only fire on a push to development/main; this issue is NOT merged there, so
# dev + prod storage stay on the existing vanilla app until the cutover (#268).
name: Deploy Storage Sub

on:
  push:
    branches: [development, main]
    paths: ['subs/storage/**']
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Target env for manual deploy'
        required: true
        type: choice
        options: [demo, prod]
        default: demo

# Required so the called reusable workflow can request id-token: write for OIDC.
# (Repo default_workflow_permissions is "read", which would otherwise cap
# id-token at "none" and fail the call at startup.)
permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: dev
      build_command: 'npm ci && npm run build'
      artifact_dir: dist
    secrets: inherit

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: prod
      build_command: 'npm ci && npm run build'
      artifact_dir: dist
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: ${{ inputs.deploy_env || 'demo' }}
      build_command: 'npm ci && npm run build'
      artifact_dir: dist
    secrets: inherit
