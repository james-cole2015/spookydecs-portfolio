# Spike caller (#269) for the storage sub.
#   push to development  -> deploy dev   (auto)
#   push to main         -> deploy prod  (auto)
#   demo                 -> manual workflow_dispatch only (keeps demo freezable)
# Storage is vanilla JS today, so no build_command/artifact_dir are passed.
name: Deploy Storage Sub

on:
  push:
    branches: [development, main]
    paths: ['subs/storage/**']
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Target env for manual deploy'
        required: true
        type: choice
        options: [demo, prod]
        default: demo

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: dev
    secrets: inherit

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: prod
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: storage
      deploy_env: ${{ inputs.deploy_env }}
    secrets: inherit
