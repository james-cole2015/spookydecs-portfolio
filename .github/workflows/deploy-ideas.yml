# Caller workflow for the ideas sub (#334).
#   push to development  -> deploy dev   (auto)
#   push to main         -> deploy prod  (auto)
#   push to demo         -> deploy demo  (auto; #318 branch-promotion model)
#   prod                 -> manual workflow_dispatch hatch (emergency prod deploy)
#
# Ideas is a React + Vite app built via the @spookydecs/ui npm workspace (#320),
# mirroring deploy-storage.yml. build_workdir '.' runs from the repo root so
# workspace hoisting resolves @spookydecs/ui (built first since dist/ is
# gitignored). artifact_dir is dist (relative to subs/ideas/).
#
# NOTE (#334 scope): this issue verifies the dev job only. Prod/demo deploy +
# legacy ideas CodePipeline/CodeBuild retirement are deferred to the Paxin
# smoke test (#371) — the prod/manual jobs are defined here but not exercised yet.
name: Deploy Ideas Sub

on:
  push:
    branches: [development, main, demo]
    paths: ['subs/ideas/**', 'packages/ui/**']
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Target env for manual deploy'
        required: true
        type: choice
        options: [prod]
        default: prod

# Required so the called reusable workflow can request id-token: write for OIDC.
permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: ideas
      deploy_env: dev
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:ideas'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: ideas
      deploy_env: prod
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:ideas'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-demo:
    if: github.event_name == 'push' && github.ref == 'refs/heads/demo'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: ideas
      deploy_env: demo
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:ideas'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-sub.yml
    with:
      sub: ideas
      deploy_env: ${{ inputs.deploy_env || 'prod' }}
      build_command: 'npm ci && npm run build -w @spookydecs/ui && npm run build:ideas'
      build_workdir: '.'
      artifact_dir: dist
    secrets: inherit
