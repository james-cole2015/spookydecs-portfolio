<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpookyDecs - Ideas</title>

    <!-- Theme init (no-flash): set dark/light class from localStorage before paint. Default dark. -->
    <script>
      (function () {
        var t = localStorage.getItem('sd-theme');
        if (t !== 'light' && t !== 'dark') t = 'dark';
        var el = document.documentElement;
        el.classList.remove('light', 'dark');
        el.classList.add(t);
        el.style.colorScheme = t;
      })();
    </script>

    <!-- Shared CDN config + auth (provide window.SpookyConfig / window.SpookyAuth) -->
    <script src="https://assets.spookydecs.com/components/api-config.js"></script>
    <script src="https://assets.spookydecs.com/components/auth-helpers.js"></script>

    <!-- Localhost dev: route API calls through the Vite proxy (no auth cookie needed) -->
    <script>
      if (window.location.hostname === 'localhost' && window.SpookyConfig) {
        const _get = window.SpookyConfig.get.bind(window.SpookyConfig);
        window.SpookyConfig.get = async () => ({ ...(await _get()), API_ENDPOINT: '/devapi' });
      }
    </script>

    <!-- Shared CDN web components (coexist with React) -->
    <!-- Header is now the native React <AppHeader> from @spookydecs/ui (#348) — CDN spookydecs-header dropped. -->
    <!-- Gallery is now the native React <PhotoGallery> from @spookydecs/ui (#328) — CDN photo-gallery dropped. -->
    <!-- Upload stays a CDN concern: PhotoGallery + usePhotoUpload delegate to <photo-upload-modal>/<photo-upload-service>. -->
    <script src="https://assets.spookydecs.com/components/photo-upload-service.js"></script>
    <script src="https://assets.spookydecs.com/components/photo-upload-modal.js"></script>
</head>
<body>
    <!-- Deployed via GitHub Actions (_deploy-sub.yml / deploy-ideas.yml, #334) -->
    <!-- React mount point (header renders inside the React tree via <AppHeader>) -->
    <div id="root"></div>

    <!-- React entry (Vite builds to ./dist for the deploy) -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
