<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpookyDecs Gallery — Holiday Display Showcase</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎃</text></svg>">

  <!-- Theme init (no-flash): set dark/light class from localStorage before paint. Default dark. -->
  <script>
    (function () {
      var t = localStorage.getItem('sd-theme');
      if (t !== 'light' && t !== 'dark') t = 'dark';
      var el = document.documentElement;
      el.classList.remove('light', 'dark');
      el.classList.add(t);
      el.style.colorScheme = t;
    })();
  </script>

  <!-- Shared CDN config (provides window.SpookyConfig). Gallery reads are public — no auth-helpers. -->
  <script src="https://assets.spookydecs.com/components/api-config.js"></script>

  <!-- Localhost dev: route API calls through the Vite proxy -->
  <script>
    if (window.location.hostname === 'localhost' && window.SpookyConfig) {
      const _get = window.SpookyConfig.get.bind(window.SpookyConfig);
      window.SpookyConfig.get = async () => ({ ...(await _get()), API_ENDPOINT: '/devapi' });
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
