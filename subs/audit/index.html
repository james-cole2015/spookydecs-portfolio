<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit | SpookyDecs</title>

    <script src="https://assets.spookydecs.com/components/spookydecs-header.js"></script>
    <script src="https://assets.spookydecs.com/components/api-config.js"></script>
    <script src="https://assets.spookydecs.com/components/auth-helpers.js"></script>

    <script>
      if (window.location.hostname === 'localhost' && window.SpookyConfig) {
        const _get = window.SpookyConfig.get.bind(window.SpookyConfig);
        window.SpookyConfig.get = async () => ({ ...(await _get()), API_ENDPOINT: '/devapi' });
      }
    </script>

    <link rel="stylesheet" href="/css/audit.css">
    <link rel="stylesheet" href="/css/record-detail.css">
</head>
<body>
    <spookydecs-header page-title="Audit" logout-url="https://auth.spookydecs.com"></spookydecs-header>

    <main id="app-container"></main>

    <script src="https://unpkg.com/navigo@8.11.1/lib/navigo.min.js"></script>

    <script src="/js/shared/toast.js"></script>
    <script src="/js/shared/modal.js"></script>

    <script src="/js/utils/audit-config.js"></script>
    <script src="/js/utils/state.js"></script>
    <script src="/js/utils/audit-api.js"></script>
    <script src="/js/utils/router.js"></script>

    <script src="/js/components/FilterBar.js"></script>
    <script src="/js/components/RecordsTable.js"></script>
    <script src="/js/components/RecordDetailModal.js"></script>

    <script src="/js/pages/record-list.js"></script>

    <script src="/js/app.js"></script>
</body>
</html>
