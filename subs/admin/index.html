<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpookyDecs Admin</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/action-center.css">
    <link rel="stylesheet" href="css/iris.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/search-text.css">
</head>
<body>
  <script src="https://assets.spookydecs.com/components/api-config.js"></script>
  <script src="https://assets.spookydecs.com/components/auth-helpers.js"></script>

  <!-- Localhost dev: route API calls through Vite proxy (no auth cookie needed) -->
  <script>
    if (window.location.hostname === 'localhost' && window.SpookyConfig) {
      const _get = window.SpookyConfig.get.bind(window.SpookyConfig);
      window.SpookyConfig.get = async () => ({ ...(await _get()), API_ENDPOINT: '/devapi' });
    }
  </script>

  <script src="https://assets.spookydecs.com/components/spookydecs-header.js"></script>

  <spookydecs-header page-title="Administration" logout-url="https://auth.spookydecs.com"></spookydecs-header>


    <!-- Main Content Container -->
    <div id="app-container">
        <!-- Router will inject content here -->
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/navigo@8.11.1/lib/navigo.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
